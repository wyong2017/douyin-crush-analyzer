<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2442"/>
      <stop offset="40%" style="stop-color:#FF4D6A"/>
      <stop offset="100%" style="stop-color:#FF6B8A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.05);"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="900" height="280" rx="20" fill="url(#bg)"/>
  <rect width="900" height="280" rx="20" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="120" fill="rgba(255,255,255,0.03)"/>
  <circle cx="850" cy="230" r="150" fill="rgba(255,255,255,0.03)"/>
  <circle cx="750" cy="40" r="80" fill="rgba(255,255,255,0.02)"/>
  <!-- Border -->
  <rect x="16" y="16" width="868" height="248" rx="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Emoji icon -->
  <text x="100" y="155" font-size="72" text-anchor="middle" filter="url(#glow)">🔮</text>
  <!-- Main Title -->
  <text x="480" y="100" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="40" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">小红书 Crush 分析器</text>
  <!-- Subtitle -->
  <text x="480" y="140" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle">给我一个小红书链接，AI 帮你读懂 TA 的一切</text>
  <!-- Tagline -->
  <text x="480" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.65)" text-anchor="middle">Powered by Claude Desktop + 5 Psychology Theories + Claude in Chrome</text>
  <!-- Tags row -->
  <rect x="195" y="192" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="240" y="211" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">心理画像</text>
  <rect x="295" y="192" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="340" y="211" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">理想型推断</text>
  <rect x="395" y="192" width="90" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="440" y="211" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">追求攻略</text>
  <rect x="495" y="192" width="100" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="545" y="211" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">交互式报告</text>
  <rect x="605" y="192" width="100" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="655" y="211" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">Claude Skill</text>
  <!-- Bottom accent line -->
  <rect x="350" y="240" width="200" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>
